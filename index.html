		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

# Why care about Nix?
- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Nix allows for a **declarative** way to manage dependencies.
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Nix allows for **reproducible** (deterministic) builds.
  - No need to hunt for differences in environments. If it builds once, it
    should build everytime.
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->Nix allows for **isolated** environments.
  - No need to worry about conflicting dependencies.
- &shy;<!-- .element: class="fragment" data-fragment-index="4" -->Nix allows for **efficient** builds.
  - Efficient sharing of common dependencies.
  - Able to avoid rebuilding packages across many machines via binary caching.
  
### NixOS
<!-- .element: class="fragment" data-fragment-index="5" -->
- &shy;<!-- .element: class="fragment" data-fragment-index="5" -->*NixOS* allows for a **declarative** way to manage Linux systems.

### Nix Package Manager Usage
- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Build, run and install packages defined in the `Nix` language.
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Make a Nix package available in an **ephemeral** shell:

```bash
$ htop
htop: command not found

$ nix-shell -p htop
...
[nix-shell]$ htop # Works just fine
[nix-shell]$
exit

$ htop # Returned to normal shell with no htop available
htop: command not found
```
<!-- .element: class="fragment" data-fragment-index="2" -->
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->Install a package globally
<!-- .element: class="fragment" data-fragment-index="3" -->
```bash
$ nix-env -iA nixpkgs.htop
$ htop # Works
```
<!-- .element: class="fragment" data-fragment-index="3" -->
- &shy;<!-- .element: class="fragment" data-fragment-index="4" -->Build a package from local file `default.nix`
```bash
$ nix-build
...
$ ls -la
default.nix
result/ -> /nix/store/...
```
<!-- .element: class="fragment" data-fragment-index="4" -->

### `NixOS`
- Linux operating system where (almost) everything is configured and managed via `Nix` and `nixpkgs`.
- You configure your system via a top-level configuration file written in Nix.
- Ability to define *modules* for customizing functionality.

#### Some Option Examples
- [`users.users`](https://nixos.org/manual/nixos/stable/options#opt-users.users)
- [`users.extraUsers.<name>.openssh.authorizedKeys.keyFiles`](https://nixos.org/manual/nixos/stable/options#opt-users.extraUsers._name_.openssh.authorizedKeys.keyFiles)
- [`networking.proxy.httpProxy`](https://nixos.org/manual/nixos/stable/options#opt-networking.proxy.httpProxy)
- [`virtualisation.docker.rootless.enable`](https://nixos.org/manual/nixos/stable/options#opt-virtualisation.docker.rootless.enable)
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

<!-- .element: style="display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left" -->
### `NixOS` [Modules](https://nixos.wiki/wiki/NixOS_modules)

NixOS modules offer a way to separate system options atomically.
They are composed of three components:
1. `imports` (ability to compose with other modules)
2. `options` (options offered that other modules can access)
3. `config` (actual configuration dependent on each option)

```nix
{
  imports = [
    # Paths to other modules.
    # Compose this module out of smaller ones.
  ];

  options = {
    # Option declarations.
    # Declare what settings a user of this module module can set.
    # Usually this includes a global "enable" option which defaults to false.
  };

  config = {
    # Option definitions.
    # Define what other settings, services and resources should be active.
    # Usually these depend on whether a user of this module chose to "enable" it
    # using the "option" above. 
    # Options for modules imported in "imports" can be set here.
  };
}
```
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

### `NixOS` on Jetson
NVIDIA's Jetpack SDK ported to NixOS
- https://github.com/anduril/jetpack-nixos
- L4T packages with mainline kernel
- CUDA, TensorRT, etc
- Currently targetting Jetpack 5.1 (fork targetting Jetpack 6 exists)

Jetson AGX Xavier/Orin configurations that utilize the above:
- https://github.com/a-yyg/nixos-jetson
- The configuration is setup in such a way that simply connecting the Jetsons to the network appropriately and doing `nix run github:serokell/deploy-rs` from a host PC are enough to deploy the proper configuration to each machine.

<div class="" style="position: absolute; left: 1%; top: 15%; height: 90%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center" >

```nix[]
{                                                                             
  description = "Nvidia Jetson Xavier AGX";                                  

  inputs = {
    nixpkgs.url = "nixpkgs/nixos-23.11";
    jetpack.url = "github:anduril/jetpack-nixos/8f27a0b1406c628b47cfd36932d70a96baf90d72";
    agenix.url = "github:ryantm/agenix";

    deploy-rs = {
      url = "github:serokell/deploy-rs";
      inputs.nixpkgs.follows = "nixpkgs";
    };
  };
  
  outputs = { self, ... }@inputs:
	...
  {
    nixosConfigurations.xavier = (import ./systems/xavier.nix) {
      inherit (inputs) nixpkgs jetpack agenix home-manager nixvim;
      inherit pkgs;
    };
	...

    deploy = {
      sshUser = "root";
      user = "root";
      sshOpts = [ "-i" "/home/host/.ssh/jetson" ];
      autoRollback = false;
      magicRollback = false;
      remoteBuild = true;

      nodes = {
        "xavier" = {
          hostname = "100.74.155.72";
          profiles.system = {
            path = inputs.deploy-rs.lib.aarch64-linux.activate.nixos self.nixosConfigurations.xavier;
          };
        };
      };
    };
  };
}
```

```nix[]

let
  xavier = import ./jetson.nix
  ({
    hostname = "xavier";
    modules = [
      ../modules/xavier-hardware.nix
      {
        age.secrets.tailscale.file = ../secrets/tailscale.age;
        age.secrets.cachix-xavier.file = ../secrets/cachix-xavier.age;
      }
      ({ config, ... }: {
        services.cachix-watch-store = {
          enable = true;
          cacheName = "a-yyg";
          cachixTokenFile = config.age.secrets.cachix-xavier.path;
        };
      })
      ({ config, ... }: { # Tailscale
        environment.systemPackages = [ pkgs.tailscale ];
        services.tailscale.enable = true;
        services.tailscale.authKeyFile = config.age.secrets.tailscale.path;

        services.resolved = {
          enable = true;
          fallbackDns = [ "1.1.1.1#one.one.one.one" ];
        };
      })
    ];

<div class="" style="position: absolute; left: 5%; top: 18%; height: 50%; width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center" >

We may have defined the Nix function that builds `m4_tensorrt_yolox`, but in order to use it we need to make it so we can give all of the dependencies as Nix inputs.
</div>
<div class="" style="position: absolute; left: 5%; top: 25%; height: 90%; width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center" >

- Solution: recursively perform the same procedure for all necessary dependencies:

1. &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Create `default.nix` based on `package.xml`.
1. &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Clone each dependency in `.repos` file or `git submodule`.
1. &shy;<!-- .element: class="fragment" data-fragment-index="3" -->Take each dependency as root and perform the steps starting from 1 again.

</div>

<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<!-- .element: style="display: flex; flex-direction: column; align-items: flex-start; justify-content: space-evenly" align="left" -->
### **Advantages**
- Reusable dependencies between packages (when compared to Docker images).
	- No wasted space or compile time.
	- Able to build once and deploy everywhere with [binary caching](https://app.cachix.org/).
- Declarative configuration means no need to fish for configuration files in several locations. Easier to version control **entire systems**.
	- Easier to ensure correctness of configuration (when compared to e.g. Ansible).
	- If the configuration is correct, the deployed system should be correct.
- Easy distributed building/cross-compiling.
	
### **Disadvantages / Limitations**
- Necessary to generate Nix code for most packages.
- Files managed by NixOS are read-only. This means there is only one point of failure (the NixOS configuration file), but it also means that iterative development is difficult if not impossible. You can't "just edit" system files like `/etc/systemd/` services.
- Non-mainstream technology == Harder to get official support. Need to solve problems ourselves.

<split even gap="3">

### Comparison to Ansible
- NixOS configuration is not step-by-step (e.g. create this user then install these packages then clone this repository.) Instead, it is entirely declarative.

### Comparison to Docker
- Docker offers true isolation, especially when running a VM. Nix is not a VM.
- How is the performance comparison? Haven't tested yet.
